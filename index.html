<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 微信分享 OG 标签 -->
    <meta property="og:title" content="这是我的自定义分享标题2">
    <meta property="og:description" content="这是我的自定义分享描述文字">
    <meta property="og:image" content="https://picsum.photos/800/418">
    <meta property="og:type" content="website">
    
    <title>微信分享测试</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            max-width: 600px; 
            margin: 50px auto; 
            padding: 20px;
            text-align: center;
        }
        .tag { 
            background: #07c160; 
            color: white; 
            padding: 5px 15px; 
            border-radius: 20px; 
            display: inline-block;
            margin: 10px 5px;
        }
        pre { 
            background: #f5f5f5; 
            padding: 15px; 
            border-radius: 8px;
            text-align: left;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🎉 微信分享测试页</h1>
    
    <div>
        <span class="tag">✅ og:title</span>
        <span class="tag">✅ og:description</span>
        <span class="tag">✅ og:image</span>
    </div>
    
    <h3>当前 OG 标签内容：</h3>
    <pre>
og:title = "这是我的自定义分享标题"
og:description = "这是我的自定义分享描述文字"
og:image = "https://picsum.photos/800/418"
    </pre>
    
    <p>把这个链接复制到 iOS 分享试试看 👇</p>
    <p style="color: #07c160; font-weight: bold;">https://你的项目.vercel.app</p>
</body>
</html>
